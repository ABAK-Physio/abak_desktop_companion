name: abak_desktop_companion
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  sqflite_common_ffi: ^2.3.0
  file_picker: ^10.2.0
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  intl: ^0.20.2
  window_manager: ^0.4.3
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  qr_flutter: ^4.1.0
  archive: ^4.0.7
  xml: ^6.5.0
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8
  package_info_plus: ^8.0.2
  abak_shared:
    path: ../abak_shared

dev_dependencies:
  flutter_test:
    sdk: flutter

  intl_utils: ^2.8.7

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  class_name: S
  main_locale: fr_FR
  supported_locales:
    - en_GB
    - fr_FR
    - de_DE
    - it_IT
    - es_ES
    - pt_PT
    - nl_NL